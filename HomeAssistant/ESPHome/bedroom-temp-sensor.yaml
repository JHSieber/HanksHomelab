
substitutions:
  name: esphome-web-817890
  friendly_name: Henry's Room

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project:
    name: esphome.web
    version: '1.0'

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api: 
  encryption: 
    key: !secret api_password
# Allow Over-The-Air updates
ota: 
  - platform: esphome
    password: !secret ota_password

# Allow provisioning Wi-Fi via serial
improv_serial:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


binary_sensor:
  - platform: gpio
    pin:
      number: GPIO12
      mode: INPUT_PULLUP
      inverted: true
    name: "Physical Switch"
    id: switch_status


sensor:
  - platform: dht
    pin: GPIO14
    temperature: 
      id: temp
      name: "Henry's room Temperature"
      unit_of_measurement: "°F"
      filters:
        - lambda: return x * 1.8 + 32;
    humidity:
      id: hum
      name: "Henry's room Humidity"
    update_interval: 30s
    model: DHT22

# Enable I2C communication
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 400kHz

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

# Define the LCD1602 in parallel mode
display:
  - platform: lcd_pcf8574
    id: lcd1602
    dimensions: 16x2
    address: 0x27
    lambda: |-
      // Convert the float to a string with 2 decimal places
      //std::string power_usage_str = std::to_string(id(power_usage).state);
      // Limit to 2 decimal places
      //if (power_usage_str.find('.') != std::string::npos) {power_usage_str = power_usage_str.substr(0, power_usage_str.find('.') + 3);}
      // Print info``
      //if (power_usage_str == "nan") {it.print(0, 1, "Thinking...");} 
      //else {
      //power_usage_str += " W";
      //it.print(0, 0, "Power: ");
      //it.print(7, 0, power_usage_str.c_str());
      //}

      //
      //

      //Weather data
      std::string temp_str = std::to_string(id(temp).state);
      std::string hum_str = std::to_string(id(hum).state);
      if (temp_str.find('.') != std::string::npos) {temp_str = temp_str.substr(0, temp_str.find('.') + 2);}
      if (hum_str.find('.') != std::string::npos) {hum_str = hum_str.substr(0, hum_str.find('.'));}
      std::string temp_and_hum_str = "T:" + temp_str + " F | H:" + hum_str + "%";
      it.print(0, 1, temp_and_hum_str.c_str());

      //Switch
      if (id(switch_status).state) {it.printf(0, 0, "Switch: ON");} 
      else {it.printf(0, 0, "Switch: OFF");}
      
  - platform: ssd1306_spi
    model: "SSD1306 128x64"
    cs_pin: GPIO5
    dc_pin: GPIO16
    reset_pin: GPIO17
    id: oled_display
    lambda: |-
      it.print(0, 0, id(oled_font), "Hello, ESP32!");
      //it.printf(0, 10, id(oled_font), "Temp: %.1f F", id(temp).state);
      //it.printf(0, 20, id(oled_font), "Humidity: %.1f %%", id(hum).state);
    update_interval: 60s
    brightness: 1.0
    contrast: 1.0

font:
  - file: "fonts/georgia.ttf"
    id: oled_font
    size: 12

# Define the display update interval
interval:
  - interval: 15s
    then:
      - component.update: lcd1602





# In combination with the `ap` this allows the user
# to provision wifi credentials to the device via WiFi AP.
captive_portal:

dashboard_import:
  package_import_url: github://esphome/example-configs/esphome-web/esp32.yaml@main
  import_full_config: true

# Sets up Bluetooth LE (Only on ESP32) to allow the user
# to provision wifi credentials to the device.
esp32_improv:
  authorizer: none

# To have a "next url" for improv serial
web_server:

