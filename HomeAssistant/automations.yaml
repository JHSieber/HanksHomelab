- id: '1714759632958'
  alias: Sunset lights on
  description: Turn on all lights either 1hr30min or 45mins before sunset depending on local weather forecast. 
  triggers:
  - event: sunset
    offset: -00:45:00
    trigger: sun
  - event: sunset
    offset: -01:30:00
    trigger: sun
  conditions:
  - condition: and
    conditions: []
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: sun
        before: sunset
        before_offset: -01:00:00
        #Check if local weather is sunny or any other type (turn on early if it is not sunny)
      - condition: not
        conditions:
        - condition: state
          entity_id: weather.forecast_home_2
          attribute: cloud_coverage
          state:
          - Sunny
    - condition: sun
      before: sunset
      after: sunset
      after_offset: -01:00:00
  #Check away mode stat before taking any actions 
  - condition: state
    entity_id: input_boolean.away_mode
    state:
    - 'off'
  actions:
  - metadata: {}
    data: {}
    target:
      floor_id:
      - first_floor
      - second_floor
    action: light.turn_on
  - metadata: {}
    data:
      option: Evening
    target: #update phase of day to evening once lights are on.
      entity_id: input_select.phase_of_day
    action: input_select.select_option
  mode: single
