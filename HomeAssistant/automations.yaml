- id: '1737490238963'
  alias: Keep water main from freezing
  description: When the water main leak sensor goes below 36 degrees turn on heater
    until it goes above 38
  trigger:
  - type: temperature
    platform: device
    device_id: 7409841d68c4e5ca612a7a7e7be17639
    entity_id: ba60fd34b0a4aebebcb76f002d4c8616
    domain: sensor
    below: 37
  condition:
  - condition: device #make sure heater is not already on
    type: is_off
    device_id: 46d5a141fb69bec7428d160f26e7b2e8
    entity_id: 7099b44022569ac0d39d7bde6803b545
    domain: switch
  action:
  - type: turn_on
    device_id: 46d5a141fb69bec7428d160f26e7b2e8
    entity_id: 7099b44022569ac0d39d7bde6803b545
    domain: switch
  - wait_for_trigger: #wait to reach a safe temp before turning off in the same automation flow. Decrease extra running automations
    - type: temperature
      platform: device
      device_id: 7409841d68c4e5ca612a7a7e7be17639
      entity_id: ba60fd34b0a4aebebcb76f002d4c8616
      domain: sensor
      above: 38
  - type: turn_off
    device_id: 46d5a141fb69bec7428d160f26e7b2e8
    entity_id: 7099b44022569ac0d39d7bde6803b545
    domain: switch
  mode: single

- id: '1746452019631'
  alias: Sunrise timelapse
  description: at sunrise, take a snapshot from attic security cam for long term timelapse
  triggers:
  - trigger: sun
    event: sunrise
    offset: 01:30:00
  conditions: []
  actions:
  - action: shell_command.save_sunrise_snapshot
    data: {}
  mode: single

- id: '1746453071139'
  alias: Start Timelapse
  description: Initiates a timelapse from attic security cam, runs until the Timelapse active turns off
  triggers:
  - trigger: state
    entity_id:
    - input_boolean.timelapse_active
    to: 'on'
  conditions: []
  actions:
  - repeat:
      sequence: #Save a snapshot from the camera every 10 seconds and store in a temp timelapse folder for processing.
      - action: shell_command.save_session_snapshot
        data: {}
      - delay:
          hours: 0
          minutes: 0
          seconds: 10
          milliseconds: 0
      until:
      - condition: state
        entity_id: input_boolean.timelapse_active
        state: 'off'
  - action: shell_command.run_timelapse_processing #once state is toggled off, then run timelapse processing script to handle creating a timelapse with the photos before clearing the temp folder to save space
    data: {}
  mode: single

