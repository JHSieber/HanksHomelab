timelapse_test:
  sequence:
  - repeat:
      count: 10
      sequence:
      - action: camera.snapshot
        metadata: {}
        data:
          filename: /media/timelapse/reolink_{{ now().timestamp() }}.jpg
        target:
          device_id: f1fdea1e9aa39d2e93f8cdfb593c56c2
  alias: timelapse test
  description: ''
