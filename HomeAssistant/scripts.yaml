toggle_living_room_lights:
  alias: Toggle Living room lights
  sequence:
  - choose:
    - conditions:
      - condition: device
        type: is_on
        device_id: 0e3509a630e2688693f6430a6076fb78
        entity_id: 53db866bb120d379fa4812245e47309b
        domain: light
      sequence:
      - service: light.turn_off
        metadata: {}
        data: {}
        target:
          area_id: living_room
      alias: Any light in area is on
    - conditions: []
      sequence:
      - service: light.turn_on
        metadata: {}
        data: {}
        target:
          area_id: living_room
  mode: single
  icon: mdi:sofa
